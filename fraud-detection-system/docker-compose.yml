services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud1234
      POSTGRES_DB: fraud_detection
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d fraud_detection"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fraud_user:fraud1234@db:5432/fraud_detection
      REDIS_URL: redis://redis:6379/0
      MODEL_PATH: ../ml/models/saved/fraud_model.joblib
      SCALER_PATH: ../ml/models/saved/scaler.joblib
      PYTORCH_MODEL_PATH: ../ml/models/saved/pytorch_model.pth
    env_file:
      - ./backend/.env
    volumes:
      - ./ml/models/saved:/app/ml/models/saved:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
