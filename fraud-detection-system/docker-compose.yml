services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud1234
      POSTGRES_DB: fraud_detection
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d fraud_detection"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fraud_user:fraud1234@db:5432/fraud_detection
      REDIS_URL: redis://redis:6379/0
      # Absolute paths inside the container (volume mounted at /app/ml/models/saved)
      MODEL_PATH: /app/ml/models/saved/fraud_model.joblib
      SCALER_PATH: /app/ml/models/saved/scaler.joblib
      PYTORCH_MODEL_PATH: /app/ml/models/saved/pytorch_model.pth
      MODEL_TRAINING_METADATA_PATH: /app/ml/models/saved/model_training_metadata.json
      JWT_SECRET_KEY: dev-fraud-platform-secret-key-min-32-chars-change-me
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:5174","http://localhost:3000"]'
    env_file:
      - ./backend/.env
    volumes:
      - ./ml/models/saved:/app/ml/models/saved:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && python -c 'from app.services.auth_service import seed_admin; from app.core.database import SessionLocal; db=SessionLocal(); seed_admin(db); db.close()' && uvicorn main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fraud_user:fraud1234@db:5432/fraud_detection
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: "celery -A app.core.celery_app.celery_app worker --loglevel=info"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
